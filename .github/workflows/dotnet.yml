name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      working-directory: ./backend  # Chạy dotnet restore trong thư mục backend
      run: dotnet restore

    - name: Build
      working-directory: ./backend  # Chạy dotnet build trong thư mục backend
      run: dotnet build --no-restore

    - name: Test
      working-directory: ./backend  # Chạy dotnet test trong thư mục backend
      run: dotnet test --no-build --verbosity normal